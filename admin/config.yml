backend:
  name: git-gateway
  branch: main # Branch to update
  site_domain: celebrated-kelpie-1fbea7.netlify.app

media_folder: "images" # Media files will be stored in the repo under images/
public_folder: "/images" # The src attribute for uploaded media will begin with /images

collections:
  - name: "photos"
    label: "Galleria Foto (Photos)"
    folder: "images"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titolo / Descrizione", name: "title", widget: "string"}
      - {label: "Immagine", name: "image", widget: "image"}
